<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Траты</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e36;
    --accent: #c8f135;
    --text: #f0f0f0;
    --muted: #888;
    --red: #ff5c5c;
    --green: #c8f135;
    --font-display: 'Unbounded', sans-serif;
    --font-body: 'Onest', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  header {
    max-width: 760px;
    margin: 0 auto 2.5rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  header h1 {
    font-family: var(--font-display);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  header span {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 300;
  }

  #save-status {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--muted);
    transition: opacity 0.3s;
  }

  #save-status.saving { color: var(--accent); }
  #save-status.error { color: var(--red); }

  .main {
    max-width: 760px;
    margin: 0 auto;
    display: grid;
    gap: 1.25rem;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .stat {
    background: var(--surface);
    padding: 1.25rem 1.5rem;
  }

  .stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.5rem;
    font-weight: 500;
  }

  .stat-value {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: -0.03em;
  }

  .stat-value.pos { color: var(--green); }
  .stat-value.neg { color: var(--red); }

  .form-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 1.5rem;
    border: 1px solid var(--border);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 0.75rem;
    align-items: end;
  }

  .field label {
    display: block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 0.4rem;
    font-weight: 500;
  }

  .field input,
  .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 0.9rem;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.95rem;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }

  .field input:focus,
  .field select:focus {
    outline: none;
    border-color: var(--accent);
  }

  .field select option { background: var(--surface2); }

  .add-btn {
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: 10px;
    padding: 0.65rem 1.4rem;
    font-family: var(--font-display);
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: -0.01em;
  }

  .add-btn:hover { background: #d4f84a; }
  .add-btn:active { transform: scale(0.97); }
  .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .filter-bar {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.35rem 1rem;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #111;
    font-weight: 500;
  }

  .filter-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

  .entries-card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .entries-header {
    display: grid;
    grid-template-columns: 1fr 100px 110px 36px;
    padding: 0.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    font-weight: 500;
  }

  .entry {
    display: grid;
    grid-template-columns: 1fr 100px 110px 36px;
    padding: 0.9rem 1.25rem;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background 0.12s;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: none; }
  }

  .entry:last-child { border-bottom: none; }
  .entry:hover { background: var(--surface2); }

  .entry-desc { font-weight: 500; font-size: 0.95rem; }
  .entry-date { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  .cat-tag {
    display: inline-block;
    font-size: 0.7rem;
    padding: 2px 9px;
    border-radius: 20px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  .entry-amount {
    font-family: var(--font-display);
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    text-align: right;
    padding-right: 0.5rem;
  }

  .entry-amount.pos { color: var(--green); }
  .entry-amount.neg { color: var(--red); }

  .del-btn {
    width: 30px;
    height: 30px;
    background: none;
    border: 1px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    color: var(--muted);
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin-left: auto;
  }

  .del-btn:hover {
    border-color: var(--red);
    color: var(--red);
    background: rgba(255,92,92,0.08);
  }

  .empty {
    padding: 3rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
  }

  .empty span { display: block; font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.4; }

  .cat-food   { background: rgba(200,241,53,0.12); color: #c8f135; }
  .cat-trans  { background: rgba(96,165,250,0.12); color: #60a5fa; }
  .cat-home   { background: rgba(167,139,250,0.12); color: #a78bfa; }
  .cat-fun    { background: rgba(251,191,36,0.12); color: #fbbf24; }
  .cat-health { background: rgba(52,211,153,0.12); color: #34d399; }
  .cat-other  { background: rgba(148,163,184,0.12); color: #94a3b8; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr 1fr; }
    .form-row  { grid-template-columns: 1fr 1fr; }
    .stats     { grid-template-columns: 1fr; }
    .entries-header { display: none; }
    .entry { grid-template-columns: 1fr auto 32px; }
    .entry-cat { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>Траты</h1>
  <span id="month-label"></span>
  <span id="save-status"></span>
</header>

<div class="main">

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Доходы</div>
      <div class="stat-value pos" id="s-income">0 ₽</div>
    </div>
    <div class="stat">
      <div class="stat-label">Расходы</div>
      <div class="stat-value neg" id="s-expense">0 ₽</div>
    </div>
    <div class="stat">
      <div class="stat-label">Баланс</div>
      <div class="stat-value pos" id="s-balance">0 ₽</div>
    </div>
  </div>

  <div class="form-card">
    <div class="form-grid">
      <div class="field">
        <label>Описание</label>
        <input type="text" id="f-desc" placeholder="Продукты, кафе, зарплата...">
      </div>
      <div class="field">
        <label>Сумма (₽)</label>
        <input type="number" id="f-amount" placeholder="0" min="0">
      </div>
      <div class="field">
        <label>Дата</label>
        <input type="date" id="f-date">
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Категория</label>
        <select id="f-cat">
          <option value="Еда">🍔 Еда</option>
          <option value="Транспорт">🚌 Транспорт</option>
          <option value="Жильё">🏠 Жильё</option>
          <option value="Развлечения">🎮 Развлечения</option>
          <option value="Здоровье">💊 Здоровье</option>
          <option value="Прочее">📦 Прочее</option>
        </select>
      </div>
      <div class="field">
        <label>Тип</label>
        <select id="f-type">
          <option value="expense">Расход</option>
          <option value="income">Доход</option>
        </select>
      </div>
      <div class="field">
        <label>Метод</label>
        <select id="f-method">
          <option value="Карта">💳 Карта</option>
          <option value="Наличные">💵 Наличные</option>
          <option value="Перевод">📲 Перевод</option>
        </select>
      </div>
      <button class="add-btn" id="add-btn" onclick="addEntry()">+ Добавить</button>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
    <button class="filter-btn" onclick="setFilter('expense', this)">Расходы</button>
    <button class="filter-btn" onclick="setFilter('income', this)">Доходы</button>
    <button class="filter-btn" onclick="setFilter('Еда', this)">Еда</button>
    <button class="filter-btn" onclick="setFilter('Транспорт', this)">Транспорт</button>
    <button class="filter-btn" onclick="setFilter('Жильё', this)">Жильё</button>
    <button class="filter-btn" onclick="setFilter('Развлечения', this)">Развлечения</button>
  </div>

  <div class="entries-card">
    <div class="entries-header">
      <span>Описание</span>
      <span>Категория</span>
      <span style="text-align:right;padding-right:0.5rem">Сумма</span>
      <span></span>
    </div>
    <div id="entries-list"><div class="empty"><span>○</span>Загрузка...</div></div>
  </div>

</div>

<script>
  const API = 'api.php';
  const CAT_CLASS = {
    'Еда': 'cat-food', 'Транспорт': 'cat-trans', 'Жильё': 'cat-home',
    'Развлечения': 'cat-fun', 'Здоровье': 'cat-health', 'Прочее': 'cat-other'
  };

  let entries = [];
  let filter = 'all';
  let saveTimer = null;

  const today = new Date();
  document.getElementById('f-date').value = today.toISOString().split('T')[0];
  document.getElementById('month-label').textContent = today.toLocaleString('ru', { month: 'long', year: 'numeric' });

  function setStatus(msg, cls) {
    const el = document.getElementById('save-status');
    el.textContent = msg;
    el.className = cls || '';
  }

  async function loadEntries() {
    try {
      const res = await fetch(API);
      entries = await res.json();
      render();
    } catch (e) {
      setStatus('Ошибка загрузки', 'error');
      render();
    }
  }

  async function saveEntries() {
    setStatus('Сохранение...', 'saving');
    try {
      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(entries)
      });
      setStatus('Сохранено ✓');
      setTimeout(() => setStatus(''), 2000);
    } catch (e) {
      setStatus('Ошибка сохранения', 'error');
    }
  }

  function fmt(n) {
    return n.toLocaleString('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' ₽';
  }

  async function addEntry() {
    const desc = document.getElementById('f-desc').value.trim();
    const amount = parseFloat(document.getElementById('f-amount').value);
    const date = document.getElementById('f-date').value;
    const cat = document.getElementById('f-cat').value;
    const type = document.getElementById('f-type').value;
    const method = document.getElementById('f-method').value;
    if (!desc || !amount || amount <= 0 || !date) return;

    const btn = document.getElementById('add-btn');
    btn.disabled = true;

    // Ищем существующую запись с таким же описанием, категорией и типом
    const existing = entries.find(e =>
      e.desc.toLowerCase() === desc.toLowerCase() &&
      e.cat === cat &&
      e.type === type
    );

    if (existing) {
      existing.amount += amount;
      existing.date = date; // обновляем дату на последнюю
    } else {
      entries.unshift({ id: Date.now(), desc, amount, date, cat, type, method });
    }

    render();
    await saveEntries();

    document.getElementById('f-desc').value = '';
    document.getElementById('f-amount').value = '';
    btn.disabled = false;
  }

  async function deleteEntry(id) {
    entries = entries.filter(e => e.id !== id);
    render();
    await saveEntries();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const income  = entries.filter(e => e.type === 'income').reduce((s, e) => s + e.amount, 0);
    const expense = entries.filter(e => e.type === 'expense').reduce((s, e) => s + e.amount, 0);
    const balance = income - expense;

    document.getElementById('s-income').textContent = fmt(income);
    document.getElementById('s-expense').textContent = fmt(expense);
    const balEl = document.getElementById('s-balance');
    balEl.textContent = (balance < 0 ? '-' : '') + fmt(Math.abs(balance));
    balEl.className = 'stat-value ' + (balance >= 0 ? 'pos' : 'neg');

    let filtered = entries;
    if (filter === 'expense') filtered = entries.filter(e => e.type === 'expense');
    else if (filter === 'income') filtered = entries.filter(e => e.type === 'income');
    else if (filter !== 'all') filtered = entries.filter(e => e.cat === filter);

    const list = document.getElementById('entries-list');
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty"><span>○</span>Записей нет</div>';
      return;
    }

    list.innerHTML = filtered.map(e => {
      const d = new Date(e.date + 'T00:00:00');
      const dateStr = d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
      const catClass = CAT_CLASS[e.cat] || 'cat-other';
      return `<div class="entry">
        <div>
          <div class="entry-desc">${e.desc}</div>
          <div class="entry-date">${dateStr} · ${e.method}</div>
        </div>
        <div><span class="cat-tag ${catClass}">${e.cat}</span></div>
        <div class="entry-amount ${e.type === 'income' ? 'pos' : 'neg'}">
          ${e.type === 'income' ? '+' : '-'}${fmt(e.amount)}
        </div>
        <button class="del-btn" onclick="deleteEntry(${e.id})">×</button>
      </div>`;
    }).join('');
  }

  document.getElementById('f-desc').addEventListener('keydown', e => {
    if (e.key === 'Enter') addEntry();
  });

  loadEntries();
</script>
</body>
</html>
